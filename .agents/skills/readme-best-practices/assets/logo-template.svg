<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!--
    README Logo Template for GitHub projects (2026)
    ================================================
    Instructions:
    1. Replace "ABC" with your project acronym (2-4 chars)
    2. Replace "project-name" with your repo slug
    3. Customize the icon group (between ICON START / ICON END)
    4. Update chip labels (Lang1, Lang2, Tag) and chip bg colors
    5. Save as assets/logo.svg in your repo root
    6. Reference in README: <img src="assets/logo.svg" alt="..." width="320"/>

    Color palette:
      Background:  #0f172a → #1e293b (dark navy to slate)
      Primary:     #6366f1 (indigo)
      Secondary:   #06b6d4 (cyan)
      Mid:         #8b5cf6 (purple)
      Text muted:  #94a3b8
      Divider:     #334155
  -->
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0f172a"/>
      <stop offset="100%" style="stop-color:#1e293b"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1"/>
      <stop offset="100%" style="stop-color:#06b6d4"/>
    </linearGradient>
    <linearGradient id="chain" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#6366f1;stop-opacity:0.9"/>
      <stop offset="50%" style="stop-color:#8b5cf6;stop-opacity:1"/>
      <stop offset="100%" style="stop-color:#06b6d4;stop-opacity:0.9"/>
    </linearGradient>
  </defs>

  <!-- Background pill -->
  <rect width="320" height="80" rx="14" fill="url(#bg)"/>

  <!-- ====== ICON START: Replace this group with your domain icon ====== -->
  <!-- Default: generic circle + arrow icon -->
  <g transform="translate(18, 20)">
    <!-- Cascade/resolver icon: vertical dots with connecting line -->
    <line x1="10" y1="5" x2="10" y2="40"
          stroke="url(#chain)" stroke-width="2" stroke-dasharray="3 2"/>
    <circle cx="10" cy="5"  r="4"   fill="#6366f1"/>
    <circle cx="10" cy="16" r="3.5" fill="#7c3aed"/>
    <circle cx="10" cy="27" r="3.5" fill="#0891b2"/>
    <circle cx="10" cy="38" r="3.5" fill="#06b6d4"/>
    <polygon points="5,40 15,40 10,48" fill="#06b6d4" opacity="0.8"/>
  </g>
  <!-- ====== ICON END ====== -->

  <!-- Project acronym (2-4 chars) -->
  <text x="46" y="36"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-weight="700" font-size="22"
        fill="url(#accent)" letter-spacing="1">ABC</text>

  <!-- Divider -->
  <line x1="46" y1="44" x2="308" y2="44" stroke="#334155" stroke-width="0.8"/>

  <!-- Full project name / subtitle -->
  <text x="46" y="58"
        font-family="'Segoe UI', system-ui, -apple-system, sans-serif"
        font-size="10.5" fill="#94a3b8" letter-spacing="0.5">project-name</text>

  <!-- Tech chip 1 (e.g. Python) -->
  <rect x="176" y="48" width="42" height="14" rx="7" fill="#1e3a5f"/>
  <text x="197" y="58"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="8" fill="#38bdf8" text-anchor="middle">Lang1</text>

  <!-- Tech chip 2 (e.g. Rust) -->
  <rect x="222" y="48" width="38" height="14" rx="7" fill="#1c1917"/>
  <text x="241" y="58"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="8" fill="#fb923c" text-anchor="middle">Lang2</text>

  <!-- Tech chip 3 (e.g. LLM, API, CLI) -->
  <rect x="264" y="48" width="36" height="14" rx="7" fill="#0c2340"/>
  <text x="282" y="58"
        font-family="system-ui, -apple-system, sans-serif"
        font-size="8" fill="#818cf8" text-anchor="middle">Tag</text>
</svg>
