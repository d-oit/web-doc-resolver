name: CI UI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint (cli/ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: pnpm install --ignore-workspace
        working-directory: cli/ui
      - run: pnpm lint
        working-directory: cli/ui

  test:
    name: Unit Tests (cli/ui)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: pnpm install --ignore-workspace
        working-directory: cli/ui
      - run: pnpm test
        working-directory: cli/ui

  web-lint:
    name: Lint (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
        working-directory: web
      - run: npm run lint
        working-directory: web

  web-typecheck:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
        working-directory: web
      - run: npm run typecheck
        working-directory: web

  web-build:
    name: Build (web)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
        working-directory: web
      - run: npm run build
        working-directory: web

  web-e2e:
    name: E2E Tests (web)
    runs-on: ubuntu-latest
    needs: [web-build]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: 20 }
      - run: npm ci
        working-directory: web
      - run: npx playwright install chromium
        working-directory: web
      - run: npx playwright test --project=desktop
        working-directory: web
        env:
          BASE_URL: https://web-eight-ivory-29.vercel.app/

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [lint, test, web-lint, web-typecheck, web-build, web-e2e]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.lint.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.web-lint.result }}" != "success" ]] || \
             [[ "${{ needs.web-typecheck.result }}" != "success" ]] || \
             [[ "${{ needs.web-build.result }}" != "success" ]] || \
             [[ "${{ needs.web-e2e.result }}" != "success" ]]; then
            echo "Quality gate failed"; exit 1
          fi
          echo "All checks passed"
