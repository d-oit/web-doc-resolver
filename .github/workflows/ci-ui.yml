name: CI UI

on:
  push:
    branches: [main]
    paths: ['cli/ui/**']
  pull_request:
    branches: [main]
    paths: ['cli/ui/**']
  workflow_dispatch:

permissions:
  contents: read

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm typecheck

  test:
    name: Unit Tests
    runs-on: ubuntu-latest
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm test

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint, typecheck, test]
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm build
      - uses: actions/upload-artifact@v4
        with: { name: ui-build, path: cli/ui/.next }

  e2e:
    name: Playwright E2E
    runs-on: ubuntu-latest
    needs: [build]
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - run: pnpm exec playwright install --with-deps
      - run: pnpm test:e2e
      - if: always()
        uses: actions/upload-artifact@v4
        with: { name: playwright-report, path: cli/ui/playwright-report, 'retention-days': 14 }

  chromatic:
    name: Chromatic Visual Regression
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    needs: [build]
    defaults: { run: { working-directory: cli/ui } }
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: pnpm/action-setup@v4
        with: { version: 9 }
      - uses: actions/setup-node@v4
        with: { node-version: 20, cache: pnpm, cache-dependency-path: cli/ui/pnpm-lock.yaml }
      - run: pnpm install
      - uses: chromaui/action@v11
        with:
          projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
          workingDir: cli/ui
          exitOnceUploaded: true

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    if: always()
    needs: [build, e2e]
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.build.result }}" != "success" ]] || [[ "${{ needs.e2e.result }}" != "success" ]]; then
            echo "Quality gate failed"; exit 1
          fi
          echo "All checks passed"
