name: CI UI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

env:
  NODE_VERSION: '22'
  PNPM_VERSION: '9'

jobs:
  lint:
    name: Lint (cli/ui)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --ignore-workspace
        working-directory: cli/ui

      - run: pnpm lint
        working-directory: cli/ui

  test:
    name: Unit Tests (cli/ui)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: pnpm/action-setup@fe02b34f77f8bc703788d5817da081398fad5dd2 # v4.0.0
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}

      - run: pnpm install --ignore-workspace
        working-directory: cli/ui

      - run: pnpm test
        working-directory: cli/ui

  web-lint:
    name: Lint (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps
        working-directory: web

      - run: npm run lint
        working-directory: web

  web-typecheck:
    name: Typecheck (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps
        working-directory: web

      - run: npm run typecheck
        working-directory: web

  web-test:
    name: Unit Tests (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps
        working-directory: web

      - run: npm test
        working-directory: web

  web-build:
    name: Build (web)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps
        working-directory: web

      - run: npm run build
        working-directory: web

  web-e2e:
    name: E2E Tests (web)
    runs-on: ubuntu-latest
    timeout-minutes: 45
    needs: [web-build]
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'
          cache-dependency-path: web/package-lock.json

      - run: npm ci --legacy-peer-deps
        working-directory: web

      - name: Cache Playwright browsers
        uses: actions/cache@d4323d4df104b026a6aa633fdb11d772146be0bf # v4.2.2
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('web/package-lock.json') }}

      - run: npx playwright install chromium
        working-directory: web

      - run: npm run build
        working-directory: web

      - name: Start server and run tests
        run: |
          trap 'kill $SERVER_PID' EXIT
          npm run start &
          SERVER_PID=$!
          npx wait-on http://localhost:3000 -t 60000
          npx playwright test --project=desktop --project=mobile --project=tablet
        working-directory: web
        env:
          BASE_URL: http://localhost:3000

  quality-gate:
    name: Quality Gate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    if: always()
    needs: [lint, test, web-lint, web-typecheck, web-test, web-build, web-e2e]
    steps:
      - name: Check results
        run: |
          results=(
            "${{ needs.lint.result }}"
            "${{ needs.test.result }}"
            "${{ needs.web-lint.result }}"
            "${{ needs.web-typecheck.result }}"
            "${{ needs.web-test.result }}"
            "${{ needs.web-build.result }}"
            "${{ needs.web-e2e.result }}"
          )
          failed=false
          for result in "${results[@]}"; do
            if [[ "$result" != "success" && "$result" != "skipped" ]]; then
              echo "Job failed with result: $result"
              failed=true
            fi
          done
          if [[ "$failed" == "true" ]]; then
            echo "Quality gate failed"
            exit 1
          fi
          echo "All checks passed"
