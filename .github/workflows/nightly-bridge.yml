name: Nightly Bridge Integration

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      run_full_integration:
        description: 'Run integration tests with secrets'
        required: false
        default: false
        type: boolean

permissions:
  contents: write
  pull-requests: write

jobs:
  nightly-build-and-test:
    name: Nightly Build and Integration Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: '1.85'
          components: rustfmt

      - name: Cache Rust dependencies
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            cli/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('cli/Cargo.lock') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Build Rust CLI
        run: cd cli && cargo build --release

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black

      - name: Run Integration Tests
        run: PYTHONPATH=. pytest tests/integration/
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}
          SERPER_API_KEY: ${{ secrets.SERPER_API_KEY }}

      - name: Format Python
        run: |
          ruff format .
          black .

      - name: Format Rust
        run: cd cli && cargo fmt

      - name: Commit and create PR
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          git add .
          if ! git diff --cached --quiet; then
            BRANCH="chore/nightly-format-$(date +%Y%m%d)"
            git config --global user.name "github-actions[bot]"
            git config --global user.email "github-actions[bot]@users.noreply.github.com"
            git checkout -b "$BRANCH"
            git commit -m "chore(nightly): automated format and fixup"
            git push origin "$BRANCH"
            gh pr create \
              --base main \
              --head "$BRANCH" \
              --title "chore(nightly): automated format and fixup" \
              --body "Auto-format fixup from nightly CI run $(date +%Y-%m-%d)." \
              --label automated
          else
            echo "No changes to commit"
          fi
