name: Nightly Bridge Integration

on:
  schedule:
    - cron: '0 1 * * *'
  workflow_dispatch:
    inputs:
      run_full_integration:
        description: 'Run integration tests with secrets'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  nightly-build-and-test:
    name: Nightly Build and Integration Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: '1.85'
          components: rustfmt

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: cli

      - name: Build Rust CLI
        run: cd cli && cargo build --release

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black

      - name: Run Integration Tests
        run: PYTHONPATH=. pytest tests/integration/test_cli_markdown.py
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Check Python formatting
        run: |
          ruff format --check .
          black --check .

      - name: Check Rust formatting
        run: cd cli && cargo fmt --check
