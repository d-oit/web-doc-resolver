name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Restrict global permissions; each job overrides what it needs
permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  RUST_TOOLCHAIN: '1.85'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-test:
    name: Python Test
    runs-on: ubuntu-24.04
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v -m "not live"

  rust-test:
    name: Rust CLI Test
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: cli

      - name: Run clippy
        run: cd cli && cargo clippy -- -D warnings

      - name: Check formatting
        run: cd cli && cargo fmt --check

      - name: Run tests
        run: cd cli && cargo test

  build-binaries:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: [python-test, rust-test]
    permissions:
      contents: read
      id-token: write
      attestations: write
      artifact-metadata: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-gnu
            binary: do-wdr
            asset_name: do-wdr-linux-x86_64
          - os: macos-15
            target: aarch64-apple-darwin
            binary: do-wdr
            asset_name: do-wdr-macos-aarch64
          - os: windows-2025
            target: x86_64-pc-windows-msvc
            binary: do-wdr.exe
            asset_name: do-wdr-windows-x86_64.exe
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          persist-credentials: false

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@29eef336d9b2848a0b548edc03f92a220660cdb8 # stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@42dc69e1aa15d09112580998cf2ef0119e2e91ae # v2
        with:
          workspaces: cli

      - name: Build release
        run: cd cli && cargo build --release

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "cli/target/release/${{ matrix.binary }}" "dist/${{ matrix.asset_name }}"

      - name: Generate build attestation
        uses: actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26 # v4.1.0
        with:
          subject-path: dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-24.04
    timeout-minutes: 15
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8
        with:
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@b4309332981a82ec1c5618f44dd2e27cc8bfbfda # v3.0.0
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/do-wdr-linux-x86_64
            dist/do-wdr-macos-aarch64
            dist/do-wdr-windows-x86_64.exe
          body: |
            ## do-web-doc-resolver ${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            curl -L https://github.com/d-oit/do-web-doc-resolver/releases/download/${{ steps.version.outputs.VERSION }}/do-wdr-linux-x86_64 -o do-wdr
            chmod +x do-wdr
            ```

            ### Binaries
            - `do-wdr-linux-x86_64` — Linux x86_64
            - `do-wdr-macos-aarch64` — macOS Apple Silicon
            - `do-wdr-windows-x86_64.exe` — Windows x86_64

            > Binaries include [build provenance attestations](https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds) for supply-chain security.
