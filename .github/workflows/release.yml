name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write

env:
  VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
  VERCEL_PROJECT_ID: prj_DTw0VtkzBWQUnIF16jtPrRKVeXNe
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v -m "not live"

  rust-test:
    name: Rust CLI Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: 1.85
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Run tests
        run: cd cli && cargo test

      - name: Run clippy
        run: cd cli && cargo clippy -- -D warnings

      - name: Run fmt
        run: cd cli && cargo fmt --check

  deploy-ui:
    name: Deploy UI to Vercel
    runs-on: ubuntu-latest
    needs: [python-test, rust-test]
    outputs:
      url: ${{ steps.deploy.outputs.url }}
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Vercel CLI
        run: npm i -g vercel

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production
        working-directory: web

      - name: Build project
        run: vercel build --prod
        working-directory: web

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: web

  e2e-release:
    name: E2E Tests (Release)
    runs-on: ubuntu-latest
    needs: [deploy-ui]
    steps:
      - uses: actions/checkout@v6

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: pnpm install --ignore-workspace
        working-directory: cli/ui

      - name: Install Playwright browsers
        run: pnpm exec playwright install --with-deps chromium
        working-directory: cli/ui

      - name: Run E2E tests
        run: pnpm test:e2e --project=desktop
        working-directory: cli/ui
        env:
          BASE_URL: ${{ needs.deploy-ui.outputs.url }}

  build-binaries:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    needs: [python-test, rust-test]
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wdr
            asset_name: wdr-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: wdr
            asset_name: wdr-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wdr.exe
            asset_name: wdr-windows-x86_64.exe

    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: cd cli && cargo build --release

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "cli/target/release/${{ matrix.binary }}" "dist/${{ matrix.asset_name }}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [build-binaries, e2e-release]
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        uses: actions/download-artifact@v4
        with:
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          files: |
            dist/wdr-linux-x86_64
            dist/wdr-macos-aarch64
            dist/wdr-windows-x86_64.exe
          body: |
            ## do-web-doc-resolover ${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            curl -L https://github.com/d-oit/do-web-doc-resolover/releases/download/${{ steps.version.outputs.VERSION }}/wdr-linux-x86_64 -o wdr
            chmod +x wdr
            ```

            ### Binaries
            - `wdr-linux-x86_64` — Linux x86_64
            - `wdr-macos-aarch64` — macOS Apple Silicon
            - `wdr-windows-x86_64.exe` — Windows x86_64
