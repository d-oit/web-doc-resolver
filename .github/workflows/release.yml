name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Restrict global permissions; each job overrides what it needs
permissions:
  contents: read

env:
  RUST_TOOLCHAIN: '1.85'
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fea7318ecaed2b359559ac225c90a2b # v5.3.0
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v -m "not live"

  rust-test:
    name: Rust CLI Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          workspaces: cli

      - name: Run clippy
        run: cd cli && cargo clippy -- -D warnings

      - name: Check formatting
        run: cd cli && cargo fmt --check

      - name: Run tests
        run: cd cli && cargo test

  build-binaries:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: [python-test, rust-test]
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: do-wdr
            asset_name: do-wdr-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: do-wdr
            asset_name: do-wdr-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: do-wdr.exe
            asset_name: do-wdr-windows-x86_64.exe
    steps:
      - uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9 # v1
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@400e7407cfd7a091e5fbb6afec01ec146c432b7c # v2.7.7
        with:
          workspaces: cli

      - name: Build release
        run: cd cli && cargo build --release

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "cli/target/release/${{ matrix.binary }}" "dist/${{ matrix.asset_name }}"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@ef244123eb79f2f7a7e75d99086184180e6d0018 # v1.4.4
        with:
          subject-path: dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@50769540e7f4bd5e21e526ee35c689e35e0d6874 # v4.4.0
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        uses: actions/download-artifact@65a9edc5881444af0b9093a5e628f2fe47ea3b2e # v4.1.7
        with:
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@e7a8f85e1c67a31e6ed99a94b41bd0b71bbee6b8 # v2.0.9
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/do-wdr-linux-x86_64
            dist/do-wdr-macos-aarch64
            dist/do-wdr-windows-x86_64.exe
          body: |
            ## do-web-doc-resolver ${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            curl -L https://github.com/d-oit/do-web-doc-resolver/releases/download/${{ steps.version.outputs.VERSION }}/do-wdr-linux-x86_64 -o do-wdr
            chmod +x do-wdr
            ```

            ### Binaries
            - `do-wdr-linux-x86_64` — Linux x86_64
            - `do-wdr-macos-aarch64` — macOS Apple Silicon
            - `do-wdr-windows-x86_64.exe` — Windows x86_64

            > Binaries include [build provenance attestations](https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds) for supply-chain security.
