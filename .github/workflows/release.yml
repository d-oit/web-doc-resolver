name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:

# Restrict global permissions; each job overrides what it needs
permissions:
  contents: read

env:
  RUST_TOOLCHAIN: '1.85'

jobs:
  python-test:
    name: Python Test
    runs-on: ubuntu-latest
    timeout-minutes: 20
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: python -m pytest tests/ -v -m "not live"

  rust-test:
    name: Rust CLI Test
    runs-on: ubuntu-latest
    timeout-minutes: 30
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Run clippy
        run: cd cli && cargo clippy -- -D warnings

      - name: Check formatting
        run: cd cli && cargo fmt --check

      - name: Run tests
        run: cd cli && cargo test

  build-binaries:
    name: Build ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    timeout-minutes: 40
    needs: [python-test, rust-test]
    permissions:
      contents: read
      id-token: write
      attestations: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            binary: wdr
            asset_name: wdr-linux-x86_64
          - os: macos-latest
            target: aarch64-apple-darwin
            binary: wdr
            asset_name: wdr-macos-aarch64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            binary: wdr.exe
            asset_name: wdr-windows-x86_64.exe
    steps:
      - uses: actions/checkout@v6

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          toolchain: ${{ env.RUST_TOOLCHAIN }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: cli

      - name: Build release
        run: cd cli && cargo build --release

      - name: Stage asset
        shell: bash
        run: |
          mkdir -p dist
          cp "cli/target/release/${{ matrix.binary }}" "dist/${{ matrix.asset_name }}"

      - name: Generate build attestation
        uses: actions/attest-build-provenance@v4
        with:
          subject-path: dist/${{ matrix.asset_name }}

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: ${{ matrix.asset_name }}
          path: dist/${{ matrix.asset_name }}
          retention-days: 7

  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs: [build-binaries]
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Download release assets
        uses: actions/download-artifact@v8
        with:
          path: dist/
          merge-multiple: true

      - name: List assets
        run: ls -la dist

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.VERSION }}
          name: Release ${{ steps.version.outputs.VERSION }}
          generate_release_notes: true
          make_latest: true
          files: |
            dist/wdr-linux-x86_64
            dist/wdr-macos-aarch64
            dist/wdr-windows-x86_64.exe
          body: |
            ## do-web-doc-resolver ${{ steps.version.outputs.VERSION }}

            ### Install
            ```bash
            curl -L https://github.com/d-oit/web-doc-resolver/releases/download/${{ steps.version.outputs.VERSION }}/wdr-linux-x86_64 -o wdr
            chmod +x wdr
            ```

            ### Binaries
            - `wdr-linux-x86_64` — Linux x86_64
            - `wdr-macos-aarch64` — macOS Apple Silicon
            - `wdr-windows-x86_64.exe` — Windows x86_64

            > Binaries include [build provenance attestations](https://docs.github.com/en/actions/security-guides/using-artifact-attestations-to-establish-provenance-for-builds) for supply-chain security.
