name: Deploy UI

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  deployments: write
  statuses: write

env:
  VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Get GitHub repo info
        id: repo
        run: |
          REPO=$(gh repo view --json nameWithOwner -q '.nameWithOwner')
          echo "name=$REPO" >> "$GITHUB_OUTPUT"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Pull Vercel environment
        run: vercel pull --yes --environment=production
        working-directory: web

      - name: Build for Vercel
        run: vercel build --prod --standalone
        working-directory: web

      - uses: actions/upload-artifact@v7
        with:
          name: vercel-build
          path: web/.vercel/output
          retention-days: 1

    outputs:
      repo: ${{ steps.repo.outputs.name }}

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: [build]
    environment:
      name: production
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - run: npm i -g vercel

      - uses: actions/download-artifact@v4
        with:
          name: vercel-build
          path: web/.vercel/output

      - name: Deploy to Vercel
        id: deploy
        run: |
          URL=$(vercel deploy --prebuilt --prod --yes)
          echo "url=$URL" >> "$GITHUB_OUTPUT"
        working-directory: web

      - name: Summary
        run: |
          echo "Deployed **${{ needs.build.outputs.repo }}** to ${{ steps.deploy.outputs.url }}" >> "$GITHUB_STEP_SUMMARY"

    outputs:
      url: ${{ steps.deploy.outputs.url }}

  e2e-production:
    name: E2E Production Tests
    runs-on: ubuntu-latest
    needs: [deploy]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
        working-directory: web

      - name: Install Playwright
        run: npx playwright install chromium
        working-directory: web

      - name: Run production E2E tests
        run: npx playwright test --project=desktop
        working-directory: web
        env:
          BASE_URL: https://web-eight-ivory-29.vercel.app/

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: web/playwright-report/
          retention-days: 7
