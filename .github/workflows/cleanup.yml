---
name: Automated Cleanup

# yamllint disable-line rule:truthy
on:
  schedule:
    - cron: '0 2 * * 0'

  workflow_dispatch:
    inputs:
      dry_run:
        description: 'Dry run (do not create PR)'
        required: false
        default: 'true'
        type: choice
        options:
          - 'true'
          - 'false'

permissions:
  contents: write
  pull-requests: write

jobs:
  detect-unused:
    name: Detect Unused Files
    runs-on: ubuntu-latest
    outputs:
      unused_files_list: ${{ steps.unused.outputs.unused_files_list }}
      raw_files: ${{ steps.unused.outputs.raw_files }}
      quality_passed: ${{ steps.quality.outputs.quality_passed }}
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd  # v6.0.2
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405  # v6.2.0
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@e97e2d8cc328f1b50210efc529dca0028893a2d9  # v1
        with:
          toolchain: '1.85'
          components: clippy, rustfmt

      - name: Set up Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e  # v6.4.0
        with:
          node-version: '22'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install ruff black mypy types-requests
          cd web && npm ci --legacy-peer-deps

      - name: Detect unused scripts
        id: unused
        run: |
          {
            echo "# Detecting potentially unused files..."
            echo ""

            markdown_list=""
            raw_list=""

            for script in scripts/*.sh; do
              if [ -f "${script}" ]; then
                script_name=$(basename "${script}")
                refs=$(grep -r "${script_name}" . \
                  --include="*.yml" --include="*.yaml" \
                  --include="*.sh" --include="*.md" \
                  --include="*.py" --include="*.rs" \
                  --include="*.js" --include="*.ts" \
                  2>/dev/null | \
                  grep -v "^Binary" | grep -v "^\./\.git" | \
                  grep -v "${script}" | grep -c . || true)

                if [ "${refs}" -eq 0 ] && \
                   [ "${script_name}" != "quality_gate.sh" ] && \
                   [ "${script_name}" != "setup-hooks.sh" ]; then
                  echo "- ${script}"
                  markdown_list="${markdown_list}- ${script}\n"
                  raw_list="${raw_list} ${script}"
                fi
              fi
            done

            broken_links=$(find . -type l ! -exec test -e {} \; -print 2>/dev/null | \
              grep -v ".git" || true)
            if [ -n "${broken_links}" ]; then
              echo ""
              echo "## Broken Symlinks"
              echo "${broken_links}"
            fi

            old_files=$(find scripts/ .agents/ \
              -name "*debug*" -o -name "*temp*" -o -name "*backup*" 2>/dev/null || true)
            if [ -n "${old_files}" ]; then
              echo ""
              echo "## Temp/Debug Files"
              echo "${old_files}"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "unused_files_list<<EOF" >> "${GITHUB_OUTPUT}"
          echo -e "${markdown_list}" >> "${GITHUB_OUTPUT}"
          echo "EOF" >> "${GITHUB_OUTPUT}"
          echo "raw_files=${raw_list}" >> "${GITHUB_OUTPUT}"

      - name: Check file ages via git history
        id: ages
        run: |
          {
            echo "## Files Not Modified in 90+ Days"
            echo ""

            now=$(date +%s)
            cutoff=$((now - 90 * 86400))
            found=false

            for dir in scripts/ .agents/; do
              while IFS= read -r -d '' file; do
                case "${file}" in
                  *.md|*.git*) continue ;;
                esac
                last_ts=$(git log -1 --format="%ct" "${file}" 2>/dev/null || echo "0")
                if [ "${last_ts}" -lt "${cutoff}" ] 2>/dev/null; then
                  echo "- ${file} (last commit: $(date -d @"${last_ts}" +%Y-%m-%d 2>/dev/null || echo "unknown"))"
                  found=true
                fi
              done < <(find "${dir}" -type f -print0 2>/dev/null)
            done

            if [ "${found}" = false ]; then
              echo "No old files detected"
            fi
          } >> "${GITHUB_STEP_SUMMARY}"

      - name: Remove identified unused files
        if: github.event.inputs.dry_run != 'true' && steps.unused.outputs.raw_files != ''
        run: |
          for file in ${{ steps.unused.outputs.raw_files }}; do
            if [ -f "${file}" ]; then
              git rm -f "${file}"
            fi
          done

      - name: Run quality gate
        id: quality
        run: |
          echo "## Quality Gate Check" >> "${GITHUB_STEP_SUMMARY}"

          if bash ./scripts/quality_gate.sh; then
            echo "Quality gate passes" >> "${GITHUB_STEP_SUMMARY}"
            echo "quality_passed=true" >> "${GITHUB_OUTPUT}"
          else
            echo "Quality gate failed - cleanup aborted" >> "${GITHUB_STEP_SUMMARY}"
            echo "quality_passed=false" >> "${GITHUB_OUTPUT}"
            exit 1
          fi
        continue-on-error: true

      - name: Create cleanup PR
        if: github.event.inputs.dry_run != 'true' && steps.quality.outputs.quality_passed == 'true'
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1  # v7.0.5
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "cleanup: automated detection of unused files"
          title: "[Automated] Cleanup: Remove unused files and technical debt"
          body: |
            ## Automated Cleanup Report

            This PR was automatically generated by the cleanup workflow.

            ### Detected Issues
            ${{ steps.unused.outputs.unused_files_list }}

            ### Manual Review Required
            **Do not merge without human review**

            Please verify:
            - Each file is truly unused (not dynamically referenced)
            - No production functionality is affected
            - Quality gate passes
            - Documentation is updated if needed

            ### How to Disable
            If this PR is not helpful, you can:
            1. Close this PR
            2. Add files to `.cleanup-ignore` to exclude from future scans
            3. Disable workflow in repository settings

          draft: true
          branch: automated/cleanup-${{ github.run_number }}
          delete-branch: true
          labels: |
            cleanup
            automated
            technical-debt

  report:
    name: Generate Report
    runs-on: ubuntu-latest
    needs: detect-unused
    if: always()
    steps:
      - name: Summary
        run: |
          {
            echo "## Cleanup Workflow Complete"
            echo ""
            echo "- Detection job: ${{ needs.detect-unused.result }}"
            echo "- If files were detected, a DRAFT PR was created"
            echo "- Human review required before merging"
          } >> "${GITHUB_STEP_SUMMARY}"
