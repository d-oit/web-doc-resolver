name: Integration Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

env:
  PYTHON_VERSION: '3.12'

jobs:
  free-providers:
    name: Free Providers (Exa MCP + Jina + DDG)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: github.actor != 'dependabot[bot]'
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run free provider live tests
        run: |
          pytest -m live -s -v \
            tests/test_live_api_integrations.py::test_live_exa_mcp_no_api_key \
            tests/test_live_api_integrations.py::test_live_jina_no_api_key

      - name: Smoke test CLI (DDG)
        run: python -m scripts.cli "Rust agent frameworks" --log-level INFO

  mistral-integration:
    name: Mistral Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run Mistral live tests
        run: |
          pytest -m live -s -v \
            tests/test_live_api_integrations.py::test_live_mistral_browser_with_real_api_key \
            tests/test_live_api_integrations.py::test_live_mistral_websearch_with_real_api_key
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

      - name: Smoke test CLI (Mistral)
        run: python -m scripts.cli "https://example.com" --log-level INFO
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

  firecrawl-integration:
    name: Firecrawl Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run Firecrawl live tests
        run: |
          pytest -m live -s -v \
            tests/test_live_api_integrations.py::test_live_firecrawl_with_real_api_key
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

      - name: Smoke test CLI (Firecrawl)
        run: python -m scripts.cli "https://example.com" --log-level INFO
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}

  tavily-integration:
    name: Tavily Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run Tavily live tests
        run: |
          pytest -m live -s -v \
            tests/test_live_api_integrations.py::test_live_tavily_with_real_api_key
        env:
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

      - name: Smoke test CLI (Tavily)
        run: python -m scripts.cli "Rust agent frameworks" --log-level INFO
        env:
          EXA_API_KEY: ""
          TAVILY_API_KEY: ${{ secrets.TAVILY_API_KEY }}

  exa-integration:
    name: Exa Integration
    runs-on: ubuntu-latest
    timeout-minutes: 20
    if: |
      github.actor != 'dependabot[bot]' &&
      (github.event_name == 'push' ||
       (github.event_name == 'pull_request' && github.event.pull_request.head.repo.full_name == github.repository) ||
       github.event_name == 'workflow_dispatch')
    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ env.PYTHON_VERSION }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install -e .

      - name: Run Exa live tests
        run: |
          pytest -m live -s -v \
            tests/test_live_api_integrations.py::test_live_exa_sdk_with_real_api_key
        env:
          EXA_API_KEY: ${{ secrets.EXA_API_KEY }}
