name: Template Drift Check

on:
  schedule:
    - cron: '0 8 * * 1'  # Every Monday 08:00 UTC
  workflow_dispatch:

jobs:
  drift-check:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      contents: read
    steps:
      - uses: actions/checkout@v4

      - name: Check upstream template files
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TEMPLATE_REPO="d-o-hub/github-template-ai-agents"
          FILES=(".gitleaks.toml" ".pre-commit-config.yaml" "commitlint.config.cjs" "markdownlint.toml" ".actrc")
          DRIFTED=()

          echo "Comparing files with $TEMPLATE_REPO..."

          for FILE in "${FILES[@]}"; do
            echo "Checking $FILE..."
            UPSTREAM_SHA=$(gh api repos/$TEMPLATE_REPO/contents/$FILE --jq '.sha' 2>/dev/null || echo "missing")
            LOCAL_SHA=$(git hash-object "$FILE" 2>/dev/null || echo "missing")

            if [ "$UPSTREAM_SHA" == "missing" ]; then
              echo "Warning: $FILE not found in upstream template."
              continue
            fi

            if [ "$UPSTREAM_SHA" != "$LOCAL_SHA" ]; then
              echo "Drift detected in $FILE"
              DRIFTED+=("- \`$FILE\`: [Upstream Diff](https://github.com/$TEMPLATE_REPO/blob/main/$FILE) (Local: \`${LOCAL_SHA:0:7}\`, Upstream: \`${UPSTREAM_SHA:0:7}\`) ")
            fi
          done

          if [ ${#DRIFTED[@]} -gt 0 ]; then
            echo "Drift detected. Reporting..."

            ISSUE_TITLE="Template Drift Detected"

            # Construct issue body using heredoc with stripped leading tabs
            # Note: GitHub Actions run block usually doesn't like tabs, using spaces and sed to strip leading spaces if needed
            # Or just keep it simple and don't indent inside the heredoc.

            cat <<EOF > issue_body.md
Drift detected between local configuration files and the upstream template [\`$TEMPLATE_REPO\`](https://github.com/$TEMPLATE_REPO).

### Affected Files
$(printf '%s\n' "${DRIFTED[@]}")

---
*Generated by [template-drift-check.yml](https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }})*
EOF

            # Search for existing open issue
            ISSUE_NUMBER=$(gh issue list --search "$ISSUE_TITLE in:title" --state open --json number --jq '.[0].number // empty')

            if [ -n "$ISSUE_NUMBER" ]; then
              echo "Updating existing issue #$ISSUE_NUMBER"
              gh issue comment "$ISSUE_NUMBER" --body-file issue_body.md
            else
              echo "Creating new issue"
              gh issue create --title "$ISSUE_TITLE" --body-file issue_body.md
            fi

            exit 1
          else
            echo "No drift detected. All files match the upstream template."
          fi
