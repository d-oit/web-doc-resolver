name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install ruff black mypy
      
      - name: Run ruff
        run: ruff check .
        continue-on-error: true
      
      - name: Run black
        run: black --check .
        continue-on-error: true
      
      - name: Run mypy
        run: mypy scripts/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov
      
      - name: Run basic tests
        run: |
          python -m pytest --cov=scripts --cov-report=xml --cov-report=term
        continue-on-error: true

  sample:
    name: Sample Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Run sample query (no API keys)
        run: |
          python scripts/resolve.py "Rust agent frameworks" --log-level INFO
      
      - name: Run sample URL (no API keys)
        run: |
          python scripts/resolve.py "https://docs.rs/tokio" --log-level INFO
      
      - name: Test help output
        run: |
          python scripts/resolve.py --help
