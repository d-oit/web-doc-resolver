name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      test_mistral:
        description: 'Test Mistral integration'
        required: false
        default: 'false'
        type: boolean
      test_firecrawl:
        description: 'Test Firecrawl integration'
        required: false
        default: 'false'
        type: boolean

permissions:
  contents: read

jobs:
  validate-symlink:
    name: Validate Skill Symlink
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      
      - name: Validate skill symlink
        run: |
          python scripts/validate_skill_symlink.py

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-lint-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-lint-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install ruff black mypy types-requests
      
      - name: Run ruff
        run: ruff check .
        continue-on-error: true
      
      - name: Run black
        run: black --check .
        continue-on-error: true
      
      - name: Run mypy
        run: mypy scripts/ --ignore-missing-imports
        continue-on-error: true

  test:
    name: Test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ matrix.python-version }}-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-${{ matrix.python-version }}-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install pytest pytest-cov requests ddgs
      
      - name: Run basic tests
        run: |
          python -m pytest --cov=scripts --cov-report=xml --cov-report=term
        continue-on-error: true

  sample:
    name: Sample Run
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-sample-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-sample-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run sample query (no API keys)
        run: |
          python scripts/resolve.py "Rust agent frameworks" --log-level INFO
      
      - name: Run sample URL (no API keys)
        run: |
          python scripts/resolve.py "https://docs.rs/tokio" --log-level INFO
      
      - name: Test help output
        run: |
          python scripts/resolve.py --help

  mistral-test:
    name: Mistral Integration Test
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && (inputs.test_mistral == true || inputs.test_mistral == 'true')) || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-mistral-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-mistral-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Mistral test
        run: |
          python scripts/resolve.py "https://example.com" --log-level INFO
        env:
          MISTRAL_API_KEY: ${{ secrets.MISTRAL_API_KEY }}

  firecrawl-test:
    name: Firecrawl Integration Test
    runs-on: ubuntu-latest
    if: (github.event_name == 'workflow_dispatch' && (inputs.test_firecrawl == true || inputs.test_firecrawl == 'true')) || (github.event_name == 'push' && github.ref == 'refs/heads/main')
    steps:
      - uses: actions/checkout@v6
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
      
      - name: Cache pip dependencies
        uses: actions/cache@v5
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-firecrawl-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-firecrawl-
            ${{ runner.os }}-pip-
      
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
      
      - name: Run Firecrawl test
        run: |
          python scripts/resolve.py "https://example.com" --log-level INFO
        env:
          FIRECRAWL_API_KEY: ${{ secrets.FIRECRAWL_API_KEY }}
